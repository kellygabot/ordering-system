services:
  server:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-ordering-system_password}
      DB_NAME: ordering_system_db
    ports:
      - 3000:3000

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ordering-system_password}
      MYSQL_DATABASE: ordering_system_db
    ports:
      - 3306:3306
    volumes:
      - db-data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-ordering-system_password}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  db-data:

